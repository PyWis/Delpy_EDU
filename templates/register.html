{% extends "base.html" %}
{% block title %}Registra Scuola - Delpy EDU{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-header">
            <h2>Registra la tua Scuola</h2>
            <p>Crea l'account amministratore per la tua istituzione scolastica.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
            <div class="form-group">
                <label for="school_name">Nome della Scuola</label>
                <input type="text" id="school_name" name="school_name" class="form-control"
                       placeholder="es. Liceo Scientifico A. Volta" required
                       value="{{ request.form.get('school_name', '') }}">
            </div>

            <div class="form-group">
                <label for="email">Email istituzionale</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="segreteria@scuola.edu.it" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Minimo 8 caratteri" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Conferma Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Ripeti la password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Registrati</button>
        </form>

        <p class="form-footer">
            Hai già un account? <a href="{{ url_for('auth.login') }}">Accedi qui</a>
        </p>
    </div>
</div>
{% endblock %}
