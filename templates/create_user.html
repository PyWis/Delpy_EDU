{% extends "base.html" %}
{% block title %}Nuovo Utente - Delpy EDU{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-header">
            <h2>Crea Nuovo Utente</h2>
            <p>Aggiunge un nuovo membro alla scuola <strong>{{ current_user.school.name }}</strong>.</p>
        </div>

        <form method="POST" action="{{ url_for('admin.create_user') }}" novalidate>
            <div class="form-group">
                <label for="username">Nome e Cognome</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="es. Mario Rossi" required
                       value="{{ request.form.get('username', '') }}">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="mario.rossi@scuola.it" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="form-group">
                <label for="role">Ruolo</label>
                <select id="role" name="role" class="form-control">
                    <option value="student" {% if request.form.get('role', 'student') == 'student' %}selected{% endif %}>Studente</option>
                    <option value="admin" {% if request.form.get('role') == 'admin' %}selected{% endif %}>Amministratore</option>
                </select>
                <small class="form-hint">La password temporanea sarà inviata via email all'utente.</small>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('admin.user_list') }}" class="btn btn-outline">Annulla</a>
                <button type="submit" class="btn btn-primary">Crea Utente</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
